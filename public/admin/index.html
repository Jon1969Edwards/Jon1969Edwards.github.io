<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager</title>
    <script>
      (function () {
        var host = window.location.hostname;
        if (host === "jon1969edwards.github.io") {
          var target =
            "https://jon-portfolio-cms.netlify.app/admin/" +
            (location.search || "") +
            (location.hash || "");
          location.replace(target);
        }
      })();
    </script>
  </head>
  <body>
    <!-- Decap CMS — loads on Netlify; GitHub Pages redirects above -->
    <script src="https://unpkg.com/decap-cms@^3.6.0/dist/decap-cms.js"></script>
  </body>
</html>
